version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      tokio-stack:
        patterns:
          - "tokio*"
          - "tower*"
          - "hyper*"
      tonic-stack:
        patterns:
          - "tonic*"
          - "prost*"
      alloy-stack:
        patterns:
          - "alloy*"
      solana-stack:
        patterns:
          - "solana*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
